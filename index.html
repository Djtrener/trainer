<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Слова</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root { --bg:#111318; --sur:#1e2128; --sur2:#272b34; --brd:#353840; --txt:#dde2ec; --mut:#6b7280; --acc:#a8c060; --ok:#5ab896; }
html,body { height:100%; width:100%; background:var(--bg); color:var(--txt); font-family:-apple-system,sans-serif; overflow:hidden; }

.sc { display:none; height:100dvh; width:100%; flex-direction:column; }
.sc.on { display:flex; }

/* LISTS */
.lhdr { padding:1rem 1.2rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--brd); background:var(--sur); flex-shrink:0; }
.lhdr h1 { font-size:18px; font-weight:800; color:var(--acc); }
.anew { background:var(--acc); color:#0f0f0f; border:none; border-radius:20px; padding:9px 18px; font-size:14px; font-weight:700; cursor:pointer; }
.lbody { flex:1; overflow-y:auto; padding:1rem; min-height:0; }
.litem { background:var(--sur); border:1px solid var(--brd); border-radius:14px; padding:1rem 1.2rem; margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.litem.sel { border-color:var(--acc); }
.linf { flex:1; cursor:pointer; }
.lnm { font-size:16px; font-weight:600; }
.lct { font-size:12px; color:var(--mut); margin-top:2px; }
.lbts { display:flex; gap:8px; }
.lbts button { background:var(--sur2); border:1px solid var(--brd); border-radius:10px; color:var(--mut); font-size:18px; width:40px; height:40px; cursor:pointer; }
.empty { text-align:center; color:var(--mut); padding:3rem 1rem; font-size:15px; }
.empty span { display:block; font-size:40px; margin-bottom:10px; }
.sarea { height:33dvh; min-height:120px; max-height:200px; display:flex; align-items:center; justify-content:center; padding:8px; padding-bottom:calc(8px + env(safe-area-inset-bottom,0px)); flex-shrink:0; }
.sbtn { background:var(--sur); border:1px solid var(--brd); border-radius:22px; width:calc(33dvh - 16px); height:calc(33dvh - 16px); max-width:190px; max-height:190px; min-width:100px; min-height:100px; font-size:15px; font-weight:700; cursor:pointer; color:var(--txt); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.sbtn:active { background:var(--sur2); transform:scale(0.95); }
.sbtn-ic { font-size:34px; color:var(--acc); }

/* EDITOR */
.ehdr { padding:1rem 1.2rem; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--brd); background:var(--sur); flex-shrink:0; }
.eback { background:none; border:none; color:var(--mut); font-size:24px; cursor:pointer; }
.ehdr h2 { font-size:16px; font-weight:600; flex:1; }
.esave { background:var(--acc); color:#0f0f0f; border:none; border-radius:20px; padding:8px 18px; font-size:14px; font-weight:700; cursor:pointer; }
.ebody { flex:1; padding:1rem; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
.ebody input,.ebody textarea { background:var(--sur); border:1px solid var(--brd); border-radius:12px; padding:12px 14px; font-size:14px; color:var(--txt); outline:none; width:100%; }
.ebody input:focus,.ebody textarea:focus { border-color:var(--acc); }
.ebody textarea { height:52vh; resize:none; font-family:monospace; line-height:1.9; }
.ehint { font-size:11px; color:var(--mut); }

/* TRAINER */
/* top 5 buttons */
.top5 { display:flex; gap:5px; padding:8px 8px 0; flex-shrink:0; }
.t5btn { flex:1; aspect-ratio:1; background:var(--sur); border:1px solid var(--brd); border-radius:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; max-height:64px; }
.t5btn:active { background:var(--sur2); transform:scale(0.95); }
.t5btn.on { border-color:var(--acc); }
.t5btn.on .t5lb { color:var(--acc); }
.t5btn.on .t5ic { color:var(--acc); }
.t5ic { font-size:16px; color:var(--mut); }
.t5lb { font-size:9px; color:var(--mut); font-weight:600; text-align:center; line-height:1.2; }
.t5btn.stop .t5ic { color:#c0706a; }
.t5btn.stop .t5lb { color:#c0706a; }
.t5btn.prev .t5ic { color:var(--mut); }

/* options */
.opts { display:flex; gap:16px; padding:6px 12px 0; flex-shrink:0; }
.ck { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--mut); cursor:pointer; }
input[type=checkbox] { accent-color:var(--acc); width:16px; height:16px; }

/* progress */
.pwrap { height:2px; background:var(--sur2); margin:6px 12px 0; flex-shrink:0; border-radius:2px; overflow:hidden; }
.pbar { height:100%; background:var(--acc); border-radius:2px; transition:width 0.3s; }
.tprog { text-align:right; font-size:12px; color:var(--mut); padding:3px 12px 0; flex-shrink:0; }

/* card - clickable area */
.card { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1rem 1.2rem; min-height:0; overflow:hidden; cursor:pointer; user-select:none; }

/* word - 2x smaller than before */
.cword { font-size:clamp(24px,7vw,44px); font-weight:800; text-align:center; color:var(--txt); letter-spacing:-0.5px; line-height:1.2; margin-bottom:1rem; }

/* translation */
.ctr { font-size:clamp(20px,6vw,36px); font-weight:600; text-align:center; color:var(--ok); visibility:hidden; line-height:1.3; }
.ctr.show { visibility:visible; }

/* transcription - always below translation, never overlapping */
.ctrans { font-size:clamp(14px,4vw,22px); text-align:center; color:var(--mut); visibility:hidden; margin-top:0.6rem; font-style:italic; line-height:1.4; }
.ctrans.show { visibility:visible; }
</style>
</head>
<body>

<!-- LISTS -->
<div class="sc on" id="sc-lists">
  <div class="lhdr">
    <h1>&#127351; СЛОВА</h1>
    <button class="anew" onclick="openEd(null)">+ Список</button>
  </div>
  <div class="lbody" id="lbody"></div>
  <div class="sarea">
    <button class="sbtn" onclick="startT()">
      <div class="sbtn-ic">&#9654;</div>
      Начать
    </button>
  </div>
</div>

<!-- EDITOR -->
<div class="sc" id="sc-ed">
  <div class="ehdr">
    <button class="eback" onclick="goSc('sc-lists')">&#8592;</button>
    <h2 id="etitle">Новый список</h2>
    <button class="esave" onclick="saveL()">Сохранить</button>
  </div>
  <div class="ebody">
    <input type="text" id="ename" placeholder="Название (напр: Урок 1)">
    <textarea id="ewords" placeholder="кот = cat&#10;собака = dog&#10;&#10;Или вставь из таблицы (Tab)"></textarea>
    <div class="ehint">Формат: слово = word &nbsp;|&nbsp; Tab (из Excel / Google Sheets)</div>
  </div>
</div>

<!-- TRAINER -->
<div class="sc" id="sc-train">
  <!-- top 5 buttons: Назад | RU→EN | EN→RU | Оба | Стоп -->
  <div class="top5">
    <button class="t5btn prev" onclick="goPrev()">
      <div class="t5ic">&#9664;</div>
      <div class="t5lb">Назад</div>
    </button>
    <button class="t5btn on" id="mb0" onclick="setMd('ru-en',0)">
      <div class="t5ic">RU</div>
      <div class="t5lb">&#8594; EN</div>
    </button>
    <button class="t5btn" id="mb1" onclick="setMd('en-ru',1)">
      <div class="t5ic">EN</div>
      <div class="t5lb">&#8594; RU</div>
    </button>
    <button class="t5btn" id="mb2" onclick="setMd('both',2)">
      <div class="t5ic">&#8644;</div>
      <div class="t5lb">Оба</div>
    </button>
    <button class="t5btn stop" onclick="goSc('sc-lists')">
      <div class="t5ic">&#9209;</div>
      <div class="t5lb">Стоп</div>
    </button>
  </div>

  <!-- checkboxes -->
  <div class="opts">
    <label class="ck"><input type="checkbox" id="shuf" checked> перемешать</label>
    <label class="ck"><input type="checkbox" id="loop" checked> &#128260; цикл</label>
  </div>

  <!-- progress -->
  <div class="pwrap"><div class="pbar" id="pbar"></div></div>
  <div class="tprog" id="tprog">1 / 1</div>

  <!-- card = entire clickable area -->
  <div class="card" id="card" onclick="goNext()">
    <div class="cword" id="cword"></div>
    <div class="ctr" id="ctr"></div>
    <div class="ctrans" id="ctrans"></div>
  </div>
</div>

<script>
var LS = localStorage;
var lists = JSON.parse(LS.getItem('vt5_lists') || '[]');
var actId = LS.getItem('vt5_act') || null;
var editId = null;
var words = [];
var wi = 0;
var revealed = false;
var md = 'ru-en';

function saveLists() { LS.setItem('vt5_lists', JSON.stringify(lists)); }

function goSc(id) {
  var ss = document.querySelectorAll('.sc');
  for (var i = 0; i < ss.length; i++) ss[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
  if (id === 'sc-lists') renderLists();
}

function parseW(text) {
  var res = [];
  var lines = text.trim().split('\n');
  for (var i = 0; i < lines.length; i++) {
    var ln = lines[i].trim();
    if (!ln) continue;
    var p = ln.indexOf('\t') >= 0 ? ln.split('\t') : ln.split('=');
    if (p.length >= 2 && p[0].trim() && p[1].trim()) {
      res.push([p[0].trim(), p[1].trim(), p.length >= 3 ? p[2].trim() : '']);
    }
  }
  return res;
}

function cntW(t) { return parseW(t).length; }
function getL(id) { for (var i=0;i<lists.length;i++) if (lists[i].id===id) return lists[i]; return null; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderLists() {
  var b = document.getElementById('lbody');
  if (!lists.length) { b.innerHTML = '<div class="empty"><span>&#128221;</span>Нет списков.<br>Создай первый!</div>'; return; }
  var h = '';
  for (var i = 0; i < lists.length; i++) {
    var l = lists[i];
    h += '<div class="litem' + (actId===l.id?' sel':'') + '">';
    h += '<div class="linf" onclick="actL(\'' + l.id + '\')">';
    h += '<div class="lnm">' + esc(l.name) + '</div>';
    h += '<div class="lct">' + cntW(l.text) + ' слов</div></div>';
    h += '<div class="lbts">';
    h += '<button onclick="openEd(\'' + l.id + '\')">&#9998;</button>';
    h += '<button style="color:#ff5c5c" onclick="delL(\'' + l.id + '\')">&#128465;</button>';
    h += '</div></div>';
  }
  b.innerHTML = h;
}

function actL(id) { actId = id; LS.setItem('vt5_act', id); renderLists(); }

function openEd(id) {
  editId = id;
  var l = id ? getL(id) : null;
  document.getElementById('etitle').textContent = id ? 'Редактировать' : 'Новый список';
  document.getElementById('ename').value = l ? l.name : '';
  document.getElementById('ewords').value = l ? l.text : '';
  goSc('sc-ed');
}

function saveL() {
  var name = document.getElementById('ename').value.trim() || 'Без названия';
  var text = document.getElementById('ewords').value.trim();
  if (!text) { alert('Добавь слова!'); return; }
  if (editId) {
    var l = getL(editId); if (l) { l.name=name; l.text=text; }
  } else {
    var nid = 'L' + Date.now();
    lists.push({id:nid, name:name, text:text});
    if (!actId) { actId=nid; LS.setItem('vt5_act',actId); }
  }
  saveLists(); goSc('sc-lists');
}

function delL(id) {
  if (!confirm('Удалить?')) return;
  lists = lists.filter(function(l){return l.id!==id;});
  if (actId===id) { actId=lists.length?lists[0].id:null; LS.setItem('vt5_act',actId||''); }
  saveLists(); renderLists();
}

function shuf(a) {
  var b=a.slice();
  for (var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}

function buildW() {
  var l = getL(actId); if (!l) return [];
  var p = parseW(l.text);
  if (md==='ru-en') p=p.map(function(x){return [x[1],x[0],x[2]];});
  else if (md==='both') p=p.concat(p.map(function(x){return [x[1],x[0],x[2]];}));
  if (document.getElementById('shuf').checked) p=shuf(p);
  return p;
}

function setMd(m, idx) {
  md = m;
  for (var i=0;i<3;i++) document.getElementById('mb'+i).classList.toggle('on', i===idx);
  if (words.length) { words=buildW(); wi=0; showW(); }
}

function startT() {
  if (!actId) { alert('Выбери список!'); return; }
  words = buildW();
  if (!words.length) { alert('В списке нет слов!'); return; }
  wi = 0;
  goSc('sc-train');
  showW();
}

function showW() {
  revealed = false;
  var ctr = document.getElementById('ctr');
  var ctrans = document.getElementById('ctrans');
  ctr.classList.remove('show');
  ctrans.classList.remove('show');
  ctr.textContent = words[wi][1];
  ctrans.textContent = words[wi][2] || '';
  document.getElementById('cword').textContent = words[wi][0];
  document.getElementById('tprog').textContent = (wi+1) + ' / ' + words.length;
  document.getElementById('pbar').style.width = Math.round((wi+1)/words.length*100) + '%';
}

function goNext() {
  if (!revealed) {
    revealed = true;
    document.getElementById('ctr').classList.add('show');
    if (document.getElementById('ctrans').textContent) {
      document.getElementById('ctrans').classList.add('show');
    }
  } else {
    wi++;
    if (wi >= words.length) {
      if (document.getElementById('loop').checked) { words=buildW(); wi=0; }
      else { goSc('sc-lists'); return; }
    }
    showW();
  }
}

function goPrev() {
  if (wi > 0) { wi--; showW(); }
}

document.addEventListener('keydown', function(e) {
  var sc = document.querySelector('.sc.on');
  if (!sc || sc.id !== 'sc-train') return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); goNext(); }
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); goPrev(); }
});

if (!lists.length) {
  lists.push({id:'demo',name:'Урок 1',text:'я = I\nты = you\nон = he\nона = she\nмы = we\nони = they\nстудент = student\nучитель = teacher\nдом = house\nкнига = book\nкошка = cat\nсобака = dog'});
  actId='demo'; saveLists(); LS.setItem('vt5_act','demo');
}
renderLists();
</script>
</body>
</html>
